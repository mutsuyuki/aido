# =============================================================================
# アーキテクチャ設計テンプレート
# =============================================================================
#
# plan.yaml の成果物（企画書）を入力に、
# バックエンド/フロントエンドの具体的な技術設計を行う。
#
# plan.yaml → architect.yaml → fix.yaml / improve.yaml の順で使う。
#
# 使い方:
#   python main.py run workspace/my-app/settings/architect.yaml --auto-approve

project:
  name: "My App - Architecture"
  work_dir: "../work"                # ← plan.yaml と同じワークディレクトリ

generation:
  default_backend: "gemini"
  default_model: "gemini-2.5-pro"
  default_timeout_sec: 600
  default_permission_mode: "dangerously-skip-permissions"
  max_retries: 3                     # ← 設計ブラッシュアップの回数
  stop_on_failure: true
  use_leader: false
  confidence_threshold: 80
  confidence_step: 0                 # ← 閾値固定（毎回ちゃんとレビュー）

roles:
  designer:
    backend: "gemini"
    model: "gemini-2.5-pro"
    session: "stateless"
  reviewer:
    backend: "gemini"
    model: "gemini-2.5-pro"
    session: "stateless"

checks:
  commands: []

phases:
  # -------------------------------------------------------
  # バックエンド設計 → フロントエンド設計 → 整合性レビュー
  # -------------------------------------------------------
  - id: "architecture"
    title: "アーキテクチャ設計"
    description: |
      planフェーズの企画書を前提に、技術設計を行う。
      バックエンド担当とフロントエンド担当がそれぞれ設計し、
      レビューワーが整合性と実現可能性をチェックする。
    tasks:
      - "企画書（PLANファイル）を読み込んで前提を理解する"
      - "バックエンドのAPI設計・データモデルを設計する"
      - "フロントエンドの技術スタック・画面構成を設計する"
      - "バックエンドとフロントエンドの接続点が整合していることを確認する"
    steps:
      # --- 2人のアーキテクト ---
      - role: designer
        action: design_backend
        prompt: architect_backend_system.md
      - role: designer
        action: design_mobile
        prompt: architect_mobile_system.md
      # --- レビューワー ---
      - role: reviewer
        action: review_architecture
        prompt: reviewer_architecture_system.md

# =============================================================================
# ループの仕組み:
#
#   試行1: バックエンド設計 → モバイル設計 → レビュー（pass: false）
#   試行2: フィードバックを元に両方を改善 → 再レビュー
#   試行3: 最終設計 → 最終レビュー
#
# 出力ファイル:
#   - ARCHITECTURE_BACKEND.md  — バックエンド設計書
#   - ARCHITECTURE_MOBILE.md   — モバイル設計書
# =============================================================================
